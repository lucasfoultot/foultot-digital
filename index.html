<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foultot Digital</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#062b55">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Foultot Digital">

<style>

:root{
--navy:#062b55;
--navy-light:#0b3d70;
--navy-soft:#eaf0f8;
--bg:#f6f8fb;
--border:#e1e5eb;
--text:#202124;
--text-secondary:#5f6368;
--radius:8px;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:"Segoe UI",Roboto,Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
height:100vh;
overflow:hidden;
}

.app{
display:flex;
flex-direction:column;
height:100vh;
}

/* TOP BAR */

.topbar{
height:64px;
background:white;
border-bottom:1px solid var(--border);
display:flex;
align-items:center;
padding:0 24px;
gap:32px;
flex-shrink:0;
z-index:20;
}

.brand{
display:flex;
align-items:center;
gap:12px;
min-width:200px;
}

.brand img{
height:26px;
width:auto;
}

.brand-name{
font-size:15px;
font-weight:600;
color:var(--text);
letter-spacing:.2px;
}

.search-wrap{
flex:1;
max-width:680px;
display:flex;
align-items:center;
background:var(--bg);
border-radius:24px;
padding:0 18px;
height:44px;
gap:12px;
}

.search-wrap svg{
flex-shrink:0;
color:var(--text-secondary);
}

.search-wrap input{
border:none;
background:transparent;
outline:none;
font-size:14px;
width:100%;
color:var(--text);
}

.avatar{
margin-left:auto;
width:34px;
height:34px;
border-radius:50%;
background:var(--navy);
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
font-weight:700;
flex-shrink:0;
}

/* BODY LAYOUT */

.body{
display:flex;
flex:1;
min-height:0;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:white;
border-right:1px solid var(--border);
padding:18px 12px;
display:flex;
flex-direction:column;
gap:6px;
flex-shrink:0;
overflow-y:auto;
}

.import-btn{
display:flex;
align-items:center;
gap:10px;
background:var(--navy);
color:white;
border:none;
border-radius:22px;
padding:11px 18px 11px 16px;
font-size:14px;
font-weight:600;
cursor:pointer;
box-shadow:0 1px 3px rgba(6,43,85,.35);
margin-bottom:14px;
transition:background .15s ease, opacity .15s ease;
}

.import-btn:hover{
background:var(--navy-light);
}

.import-btn:disabled{
opacity:.45;
cursor:not-allowed;
box-shadow:none;
}

.nav-item{
display:flex;
align-items:center;
gap:12px;
padding:9px 14px;
border-radius:20px;
font-size:13.5px;
color:var(--text);
cursor:pointer;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
transition:background .12s ease;
}

.nav-item svg{
flex-shrink:0;
}

.nav-item:hover{
background:var(--navy-soft);
}

.nav-item.active{
background:var(--navy-soft);
color:var(--navy);
font-weight:700;
}

.nav-item .badge{
margin-left:auto;
font-size:11px;
color:var(--text-secondary);
font-weight:600;
}

.nav-item.active .badge{
color:var(--navy);
}

.nav-sep{
height:1px;
background:var(--border);
margin:10px 8px;
}

.nav-label{
font-size:11px;
font-weight:700;
color:var(--text-secondary);
letter-spacing:.5px;
text-transform:uppercase;
padding:8px 14px 4px;
}

/* MAIN CONTENT */

.main{
flex:1;
overflow-y:auto;
padding:26px 34px 50px;
}

.breadcrumb{
display:flex;
align-items:center;
gap:8px;
font-size:20px;
font-weight:500;
color:var(--text);
margin-bottom:4px;
}

.breadcrumb .crumb-link{
cursor:pointer;
color:var(--text-secondary);
transition:color .12s ease;
}

.breadcrumb .crumb-link:hover{
color:var(--navy);
}

.breadcrumb .sep{
color:var(--text-secondary);
font-weight:400;
font-size:16px;
}

.subhead{
font-size:13px;
color:var(--text-secondary);
margin-bottom:24px;
}

/* FOLDER GRID (HOME) */

.folder-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:18px;
}

.folder-card{
height:150px;
background:white;
border:1px solid var(--border);
border-radius:var(--radius);
overflow:hidden;
position:relative;
cursor:pointer;
transition:box-shadow .15s ease, transform .15s ease, border-color .15s ease;
}

.folder-card:hover{
box-shadow:0 6px 18px rgba(6,43,85,.16);
border-color:#c7d2e0;
transform:translateY(-2px);
}

.folder-card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.cover-placeholder{
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg, #0b3d70, #062b55);
}

.folder-card::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(transparent 38%, rgba(6,17,32,.85));
}

.folder-top{
position:absolute;
top:10px;
left:10px;
right:10px;
z-index:2;
display:flex;
align-items:center;
justify-content:space-between;
}

.folder-top .folder-icon{
background:rgba(255,255,255,.92);
border-radius:6px;
padding:4px;
display:flex;
}

.folder-count{
font-size:11px;
font-weight:700;
color:var(--navy);
background:rgba(255,255,255,.92);
padding:3px 9px;
border-radius:12px;
}

.folder-text{
position:absolute;
bottom:13px;
left:15px;
right:15px;
z-index:2;
color:white;
}

.folder-text .fname{
font-size:15px;
font-weight:700;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.folder-text .fsub{
font-size:11.5px;
opacity:.85;
margin-top:2px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* FILE GRID (CATEGORY) */

.file-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:16px;
margin-top:20px;
}

.file-card{
background:white;
border:1px solid var(--border);
border-radius:var(--radius);
overflow:hidden;
cursor:pointer;
position:relative;
transition:box-shadow .15s ease, border-color .15s ease;
}

.file-card:hover{
box-shadow:0 3px 12px rgba(6,43,85,.14);
border-color:#c7d2e0;
}

.file-thumb{
height:130px;
background:#eef1f5;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.file-thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.file-meta{
padding:10px 12px;
}

.file-meta .fn{
font-size:12.5px;
font-weight:600;
color:var(--text);
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.file-meta .fd{
font-size:11px;
color:var(--text-secondary);
margin-top:2px;
}

.kebab{
position:absolute;
top:6px;
right:6px;
width:28px;
height:28px;
border-radius:50%;
background:rgba(255,255,255,.92);
border:none;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
opacity:0;
transition:opacity .12s ease, background .12s ease;
}

.file-card:hover .kebab{
opacity:1;
}

.kebab:hover{
background:white;
}

.kebab-menu{
position:absolute;
top:38px;
right:6px;
background:white;
border:1px solid var(--border);
border-radius:6px;
box-shadow:0 4px 16px rgba(0,0,0,.15);
z-index:15;
overflow:hidden;
display:none;
min-width:150px;
}

.kebab-menu.show{
display:block;
}

.kebab-menu button{
display:flex;
align-items:center;
gap:10px;
width:100%;
padding:10px 14px;
border:none;
background:none;
font-size:13px;
text-align:left;
cursor:pointer;
color:var(--text);
}

.kebab-menu button:hover{
background:var(--bg);
}

.kebab-menu button.danger{
color:#c0392b;
}

/* ADD / DROPZONE TILE */

.add-tile{
height:130px;
border-radius:var(--radius);
border:2px dashed #c7d2e0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
color:var(--text-secondary);
font-size:12.5px;
gap:8px;
background:white;
transition:border-color .15s ease, color .15s ease, background .15s ease;
}

.add-tile:hover{
border-color:var(--navy);
color:var(--navy);
background:var(--navy-soft);
}

.file-grid.drag-over .add-tile{
border-color:var(--navy);
color:var(--navy);
background:var(--navy-soft);
}

/* EMPTY STATE */

.empty-state{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:60px 20px;
color:var(--text-secondary);
text-align:center;
gap:14px;
}

.empty-state .big-icon{
opacity:.55;
}

.empty-state .msg{
font-size:14px;
max-width:340px;
}

/* LIGHTBOX */

.lightbox{
position:fixed;
inset:0;
background:rgba(6,17,32,.9);
display:none;
align-items:center;
justify-content:center;
z-index:100;
padding:40px;
}

.lightbox.show{
display:flex;
}

.lightbox img{
max-width:100%;
max-height:100%;
border-radius:4px;
box-shadow:0 10px 40px rgba(0,0,0,.5);
}

.lightbox-close{
position:absolute;
top:24px;
right:32px;
background:rgba(255,255,255,.12);
border:none;
color:white;
width:40px;
height:40px;
border-radius:50%;
font-size:20px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.lightbox-close:hover{
background:rgba(255,255,255,.22);
}

.toast{
position:fixed;
bottom:26px;
left:50%;
transform:translateX(-50%) translateY(20px);
background:#202124;
color:white;
padding:12px 20px;
border-radius:6px;
font-size:13px;
opacity:0;
pointer-events:none;
transition:opacity .2s ease, transform .2s ease;
z-index:200;
}

.toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

::-webkit-scrollbar{
width:10px;
}
::-webkit-scrollbar-thumb{
background:#d5dbe5;
border-radius:5px;
}
::-webkit-scrollbar-track{
background:transparent;
}

/* ---------- SYNC / STATUS BADGE ---------- */

.sync-status{
display:flex;
align-items:center;
gap:7px;
font-size:12px;
font-weight:600;
color:var(--text-secondary);
padding:6px 12px;
border-radius:14px;
background:var(--bg);
flex-shrink:0;
white-space:nowrap;
}

.sync-dot{
width:8px;
height:8px;
border-radius:50%;
background:#8a9;
flex-shrink:0;
}

.sync-status.online .sync-dot{background:#2fa84f;}
.sync-status.offline .sync-dot{background:#c94b4b;}
.sync-status.syncing .sync-dot{background:#e0a52c;animation:pulse 1s infinite;}

@keyframes pulse{
0%,100%{opacity:1;}
50%{opacity:.35;}
}

.file-card.pending{
opacity:.6;
}

.file-card .pending-badge{
position:absolute;
top:6px;
left:6px;
background:rgba(6,43,85,.9);
color:#fff;
font-size:10px;
font-weight:700;
padding:2px 7px;
border-radius:10px;
z-index:2;
}

.file-thumb{
position:relative;
}

</style>
</head>

<script type="module">

/* ============================================================
   FOULTOT DIGITAL — Firestore only (pas de Storage)
   ------------------------------------------------------------
   Pourquoi pas de Storage : depuis février 2026, Firebase Storage
   exige le forfait payant Blaze (carte bancaire liée), même pour
   un usage minuscule. Pour rester 100% gratuit et sans CB, chaque
   fichier est stocké directement dans Firestore : les images sont
   compressées côté navigateur (redimensionnées + JPEG) puis
   enregistrées en base64 dans le document.
   La disponibilité hors-ligne est gérée nativement par Firestore
   (cache local persistant, illimité) : plus besoin de code maison
   pour ça, dès qu'un fichier a été vu une fois sur un appareil, il
   y reste, wifi ou pas.
   ============================================================ */

/* ---------- DATA ---------- */

const categories = [

{key:"garde-corps", name:"Garde-corps", sub:"Cetal"},
];

/* ---------- CONFIG FIREBASE ---------- */

const firebaseConfig = {
  apiKey: "AIzaSyA8VmG0G0IxEHkTlicftSkyV5u59M2-uoI",
  authDomain: "foultot-catalogue.firebaseapp.com",
  projectId: "foultot-catalogue",
  storageBucket: "foultot-catalogue.firebasestorage.app",
  messagingSenderId: "105164383108",
  appId: "1:105164383108:web:c30df8d9dbdc2917f533d1",
  measurementId: "G-7EP6EKDFR6"
};

const FIREBASE_READY = true;
const FIRESTORE_DOC_SAFE_LIMIT = 900 * 1024; // marge de sécurité sous la limite réelle de 1 Mio par document

let db = null;
let fbFns = {};
let allFiles = [];

async function initFirebase(){
  try{
    const [{initializeApp}, firestoreMod] = await Promise.all([
      import("https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js")
    ]);
    const app = initializeApp(firebaseConfig);
    db = firestoreMod.initializeFirestore(app, {
      localCache: firestoreMod.persistentLocalCache({
        cacheSizeBytes: firestoreMod.CACHE_SIZE_UNLIMITED
      })
    });
    fbFns = {
      collection: firestoreMod.collection,
      doc: firestoreMod.doc,
      setDoc: firestoreMod.setDoc,
      deleteDoc: firestoreMod.deleteDoc,
      onSnapshot: firestoreMod.onSnapshot
    };
    listenToFiles();
  }catch(err){
    console.error(err);
    setSyncStatus("offline", "Erreur de connexion Firebase");
    showToast("Connexion Firebase impossible, vérifie ta config / tes règles");
  }
}

/* ---------- SYNC TEMPS RÉEL (Firestore -> mémoire -> rendu) ---------- */

function listenToFiles(){
  const filesCol = fbFns.collection(db, "files");
  setSyncStatus("syncing", "Synchronisation…");
  fbFns.onSnapshot(filesCol, (snapshot) => {
    allFiles = snapshot.docs.map(d => ({
      id: d.id,
      ...d.data(),
      pending: d.metadata.hasPendingWrites
    }));
    if(snapshot.metadata.fromCache){
      setSyncStatus(navigator.onLine ? "syncing" : "offline", navigator.onLine ? "Synchronisation…" : "Hors-ligne (cache local)");
    }else{
      setSyncStatus("online", "Synchronisé");
    }
    renderSidebar();
    renderCurrentView();
  }, (err) => {
    console.error(err);
    setSyncStatus("offline", "Hors-ligne (cache local)");
  });
}

window.addEventListener("online", () => setSyncStatus("syncing", "Reconnexion…"));
window.addEventListener("offline", () => setSyncStatus("offline", "Hors-ligne (cache local)"));

/* ---------- COMPRESSION IMAGE ---------- */

function compressImageToDataURL(file, maxWidth, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > maxWidth){
          h = Math.round(h * (maxWidth / w));
          w = maxWidth;
        }
        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function fileToDataURL(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function prepareFileForUpload(file){
  if(file.type && file.type.startsWith("image/")){
    let quality = 0.75, maxWidth = 1600;
    let dataURL = await compressImageToDataURL(file, maxWidth, quality);
    let attempts = 0;
    while(dataURL.length > FIRESTORE_DOC_SAFE_LIMIT && attempts < 5){
      quality = Math.max(0.35, quality - 0.15);
      maxWidth = Math.max(800, Math.round(maxWidth * 0.75));
      dataURL = await compressImageToDataURL(file, maxWidth, quality);
      attempts++;
    }
    if(dataURL.length > FIRESTORE_DOC_SAFE_LIMIT) throw new Error("TOO_LARGE");
    return {dataURL, type:"image/jpeg"};
  }else{
    const dataURL = await fileToDataURL(file);
    if(dataURL.length > FIRESTORE_DOC_SAFE_LIMIT) throw new Error("TOO_LARGE");
    return {dataURL, type:file.type || "application/pdf"};
  }
}

/* ---------- STATUT RÉSEAU ---------- */

function setSyncStatus(state, label){
  const el = document.getElementById("syncStatus");
  const labelEl = document.getElementById("syncStatusLabel");
  if(!el) return;
  el.className = "sync-status " + state;
  labelEl.textContent = label;
}

/* ---------- STATE ---------- */

let currentCategory = null;
let searchTerm = "";

/* ---------- HELPERS ---------- */

function formatSize(bytes){
  if(bytes < 1024) return bytes + " o";
  if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + " Ko";
  return (bytes/(1024*1024)).toFixed(1) + " Mo";
}

function formatDate(ts){
  return new Date(ts).toLocaleDateString("fr-FR", {day:"2-digit", month:"2-digit", year:"numeric"});
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(() => t.classList.remove("show"), 3200);
}

function getFilesByCategory(category){
  return allFiles
    .filter(f => f.category === category)
    .sort((a,b) => b.date - a.date);
}

function getAllCounts(){
  const counts = {};
  allFiles.forEach(f => { counts[f.category] = (counts[f.category] || 0) + 1; });
  return counts;
}

function getCoverImage(key){
  const f = allFiles.find(f => f.category === key && f.type && f.type.startsWith("image/"));
  return f ? f.dataURL : null;
}

function folderIconSVG(){
  return '<svg class="folder-icon" width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M3 6.5C3 5.67157 3.67157 5 4.5 5H9.5L11.5 7H19.5C20.3284 7 21 7.67157 21 8.5V17.5C21 18.3284 20.3284 19 19.5 19H4.5C3.67157 19 3 18.3284 3 17.5V6.5Z" fill="#0b3d70" stroke="#062b55" stroke-width="1.2" stroke-linejoin="round"/></svg>';
}

function fileTypeIconSVG(){
  return '<svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="M6 2H14L19 7V20C19 21.1046 18.1046 22 17 22H6C4.89543 22 4 21.1046 4 20V4C4 2.89543 4.89543 2 6 2Z" stroke="#aab3c0" stroke-width="1.5" stroke-linejoin="round"/><path d="M14 2V7H19" stroke="#aab3c0" stroke-width="1.5" stroke-linejoin="round"/></svg>';
}

function renderCurrentView(){
  if(currentCategory === null) renderHome(); else renderCategory(currentCategory);
}

/* ---------- SIDEBAR ---------- */

function renderSidebar(){
  const counts = getAllCounts();
  const wrap = document.getElementById("navCategories");
  wrap.innerHTML = "";
  categories.forEach(c => {
    const el = document.createElement("div");
    el.className = "nav-item" + (currentCategory === c.key ? " active" : "");
    el.dataset.key = c.key;
    el.innerHTML = folderIconSVG().replace('width="30" height="30"','width="18" height="18"') +
      '<span>' + c.name + '</span>' +
      '<span class="badge">' + (counts[c.key] || "") + '</span>';
    el.addEventListener("click", () => navigate(c.key));
    wrap.appendChild(el);
  });

  document.getElementById("homeNav").className = "nav-item" + (currentCategory === null ? " active" : "");

  const importBtn = document.getElementById("importBtn");
  const importLabel = document.getElementById("importBtnLabel");
  if(currentCategory){
    importBtn.disabled = false;
    importLabel.textContent = "Importer des fichiers";
  }else{
    importBtn.disabled = true;
    importLabel.textContent = "Sélectionnez un dossier";
  }
}

/* ---------- NAVIGATION ---------- */

function navigate(key){
  currentCategory = key;
  searchTerm = "";
  document.getElementById("searchInput").value = "";
  renderSidebar();
  renderCurrentView();
}

/* ---------- HOME VIEW ---------- */

function renderHome(){
  const main = document.getElementById("main");
  const counts = getAllCounts();
  const filtered = categories.filter(c =>
    c.name.toLowerCase().includes(searchTerm) || c.sub.toLowerCase().includes(searchTerm)
  );

  main.innerHTML = `
    <div class="breadcrumb">Mon Drive</div>
    <div class="subhead">Bibliothèque fournisseurs &amp; documents techniques</div>
    <div class="folder-grid" id="folderGrid"></div>
  `;

  const grid = document.getElementById("folderGrid");
  if(filtered.length === 0){
    grid.innerHTML = '<div class="empty-state">Aucun dossier ne correspond à votre recherche.</div>';
    return;
  }

  filtered.forEach(c => {
    const card = document.createElement("div");
    card.className = "folder-card";
    const n = counts[c.key] || 0;
    const cover = getCoverImage(c.key);
    card.innerHTML = `
      ${cover ? `<img src="${cover}">` : `<div class="cover-placeholder">${folderIconSVG().replace('width="30" height="30"','width="40" height="40"').replace('#0b3d70','white').replace('#062b55','white')}</div>`}
      <div class="folder-top">
        <span class="folder-icon">${folderIconSVG().replace('width="30" height="30"','width="16" height="16"')}</span>
        ${n > 0 ? `<span class="folder-count">${n}</span>` : ""}
      </div>
      <div class="folder-text">
        <div class="fname">${c.name}</div>
        <div class="fsub">${c.sub}</div>
      </div>
    `;
    card.addEventListener("click", () => navigate(c.key));
    grid.appendChild(card);
  });
}

/* ---------- CATEGORY VIEW ---------- */

function renderCategory(key){
  const cat = categories.find(c => c.key === key);
  const main = document.getElementById("main");
  const files = getFilesByCategory(key).filter(f =>
    f.name.toLowerCase().includes(searchTerm)
  );

  main.innerHTML = `
    <div class="breadcrumb">
      <span class="crumb-link" id="crumbHome">Mon Drive</span>
      <span class="sep">›</span>
      <span>${cat.name}</span>
    </div>
    <div class="subhead">${cat.sub}</div>
    <div class="file-grid" id="fileGrid"></div>
  `;

  document.getElementById("crumbHome").addEventListener("click", () => navigate(null));

  const grid = document.getElementById("fileGrid");

  const addTile = document.createElement("div");
  addTile.className = "add-tile";
  addTile.innerHTML = `
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    <div>Ajouter des fichiers</div>
  `;
  addTile.addEventListener("click", () => document.getElementById("fileInput").click());
  grid.appendChild(addTile);

  files.forEach(f => {
    const card = document.createElement("div");
    card.className = "file-card" + (f.pending ? " pending" : "");

    const isImage = f.type && f.type.startsWith("image/");

    card.innerHTML = `
      <div class="file-thumb">
        ${f.pending ? '<span class="pending-badge">Envoi…</span>' : ""}
        ${isImage ? `<img src="${f.dataURL}">` : fileTypeIconSVG()}
      </div>
      <div class="file-meta">
        <div class="fn">${f.name}</div>
        <div class="fd">${formatSize(f.size || 0)} · ${formatDate(f.date)}</div>
      </div>
      <button class="kebab" data-id="${f.id}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="5" r="1.6" fill="#5f6368"/><circle cx="12" cy="12" r="1.6" fill="#5f6368"/><circle cx="12" cy="19" r="1.6" fill="#5f6368"/></svg>
      </button>
      <div class="kebab-menu" data-id="${f.id}">
        <button class="preview-item">Aperçu</button>
        <button class="danger delete-item">Supprimer</button>
      </div>
    `;

    card.addEventListener("click", (e) => {
      if(e.target.closest(".kebab") || e.target.closest(".kebab-menu")) return;
      if(isImage) openLightbox(f.dataURL);
    });

    const kebabBtn = card.querySelector(".kebab");
    const menu = card.querySelector(".kebab-menu");

    kebabBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      document.querySelectorAll(".kebab-menu.show").forEach(m => { if(m !== menu) m.classList.remove("show"); });
      menu.classList.toggle("show");
    });

    card.querySelector(".preview-item").addEventListener("click", (e) => {
      e.stopPropagation();
      menu.classList.remove("show");
      if(isImage) openLightbox(f.dataURL);
    });

    card.querySelector(".delete-item").addEventListener("click", async (e) => {
      e.stopPropagation();
      menu.classList.remove("show");
      await deleteFileEverywhere(f.id);
    });

    grid.appendChild(card);
  });

  grid.addEventListener("dragover", (e) => { e.preventDefault(); grid.classList.add("drag-over"); });
  grid.addEventListener("dragleave", () => grid.classList.remove("drag-over"));
  grid.addEventListener("drop", async (e) => {
    e.preventDefault();
    grid.classList.remove("drag-over");
    await handleFiles(e.dataTransfer.files, key);
  });
}

/* ---------- ENVOI (compression -> Firestore) ---------- */

async function handleFiles(fileList, key){
  const files = Array.from(fileList || []);
  if(files.length === 0) return;

  if(!db){
    showToast("Firebase pas encore connecté, réessaie dans un instant");
    return;
  }

  let okCount = 0;
  for(const file of files){
    try{
      const {dataURL, type} = await prepareFileForUpload(file);
      const id = crypto.randomUUID();
      await fbFns.setDoc(fbFns.doc(db, "files", id), {
        category:key, name:file.name, size:dataURL.length, type,
        date:Date.now(), dataURL
      });
      okCount++;
    }catch(err){
      if(err && err.message === "TOO_LARGE"){
        showToast(`"${file.name}" est trop lourd même compressé (> ~650 Ko). Essaie une version plus légère.`);
      }else{
        console.error(err);
        showToast("Erreur lors de l'envoi de " + file.name);
      }
    }
  }
  if(okCount > 0){
    showToast(okCount > 1 ? okCount + " fichiers envoyés" : "Fichier envoyé");
  }
}

/* ---------- SUPPRESSION ---------- */

async function deleteFileEverywhere(id){
  try{
    await fbFns.deleteDoc(fbFns.doc(db, "files", id));
    showToast("Fichier supprimé");
  }catch(err){
    console.error(err);
    showToast("Suppression non synchronisée (repasse en ligne pour finaliser)");
  }
}

/* ---------- LIGHTBOX ---------- */

function openLightbox(url){
  document.getElementById("lightboxImg").src = url;
  document.getElementById("lightbox").classList.add("show");
}
function closeLightbox(){
  document.getElementById("lightbox").classList.remove("show");
}

/* ---------- EVENTS ---------- */

document.getElementById("homeNav").addEventListener("click", () => navigate(null));

document.getElementById("importBtn").addEventListener("click", () => {
  if(currentCategory) document.getElementById("fileInput").click();
});

document.getElementById("fileInput").addEventListener("change", async (e) => {
  await handleFiles(e.target.files, currentCategory);
  e.target.value = "";
});

document.getElementById("searchInput").addEventListener("input", (e) => {
  searchTerm = e.target.value.trim().toLowerCase();
  renderCurrentView();
});

document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
document.getElementById("lightbox").addEventListener("click", (e) => {
  if(e.target.id === "lightbox") closeLightbox();
});
document.addEventListener("keydown", (e) => {
  if(e.key === "Escape") closeLightbox();
});

document.addEventListener("click", (e) => {
  if(!e.target.closest(".kebab") && !e.target.closest(".kebab-menu")){
    document.querySelectorAll(".kebab-menu.show").forEach(m => m.classList.remove("show"));
  }
});

/* ---------- SERVICE WORKER (installabilité + cache app shell) ---------- */

if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch((e) => console.warn("SW non enregistré", e));
  });
}

/* ---------- INIT ---------- */

setSyncStatus(navigator.onLine ? "syncing" : "offline", navigator.onLine ? "Connexion…" : "Hors-ligne (cache local)");
renderSidebar();
renderHome();
initFirebase();

</script>
