<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foultot Digital</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#062b55">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Foultot Digital">

<style>

:root{
--navy:#062b55;
--navy-light:#0b3d70;
--navy-soft:#eaf0f8;
--bg:#f6f8fb;
--border:#e1e5eb;
--text:#202124;
--text-secondary:#5f6368;
--radius:8px;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:"Segoe UI",Roboto,Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
height:100vh;
overflow:hidden;
}

.app{
display:flex;
flex-direction:column;
height:100vh;
}

/* TOP BAR */

.topbar{
height:64px;
background:white;
border-bottom:1px solid var(--border);
display:flex;
align-items:center;
padding:0 24px;
gap:32px;
flex-shrink:0;
z-index:20;
}

.brand{
display:flex;
align-items:center;
gap:12px;
min-width:200px;
}

.brand img{
height:26px;
width:auto;
}

.brand-name{
font-size:15px;
font-weight:600;
color:var(--text);
letter-spacing:.2px;
}

.search-wrap{
flex:1;
max-width:680px;
display:flex;
align-items:center;
background:var(--bg);
border-radius:24px;
padding:0 18px;
height:44px;
gap:12px;
}

.search-wrap svg{
flex-shrink:0;
color:var(--text-secondary);
}

.search-wrap input{
border:none;
background:transparent;
outline:none;
font-size:14px;
width:100%;
color:var(--text);
}

.avatar{
margin-left:auto;
width:34px;
height:34px;
border-radius:50%;
background:var(--navy);
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
font-weight:700;
flex-shrink:0;
}

/* BODY LAYOUT */

.body{
display:flex;
flex:1;
min-height:0;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:white;
border-right:1px solid var(--border);
padding:18px 12px;
display:flex;
flex-direction:column;
gap:6px;
flex-shrink:0;
overflow-y:auto;
}

.nav-item{
display:flex;
align-items:center;
gap:12px;
padding:9px 14px;
border-radius:20px;
font-size:13.5px;
color:var(--text);
cursor:pointer;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
transition:background .12s ease;
}

.nav-item svg{
flex-shrink:0;
}

.nav-item:hover{
background:var(--navy-soft);
}

.nav-item.active{
background:var(--navy-soft);
color:var(--navy);
font-weight:700;
}

.nav-item .badge{
margin-left:auto;
font-size:11px;
color:var(--text-secondary);
font-weight:600;
}

.nav-item.active .badge{
color:var(--navy);
}

.nav-sep{
height:1px;
background:var(--border);
margin:10px 8px;
}

.nav-label{
font-size:11px;
font-weight:700;
color:var(--text-secondary);
letter-spacing:.5px;
text-transform:uppercase;
padding:8px 14px 4px;
}

/* MAIN CONTENT */

.main{
flex:1;
overflow-y:auto;
padding:26px 34px 50px;
}

.breadcrumb{
display:flex;
align-items:center;
gap:8px;
font-size:20px;
font-weight:500;
color:var(--text);
margin-bottom:4px;
}

.breadcrumb .crumb-link{
cursor:pointer;
color:var(--text-secondary);
transition:color .12s ease;
}

.breadcrumb .crumb-link:hover{
color:var(--navy);
}

.breadcrumb .sep{
color:var(--text-secondary);
font-weight:400;
font-size:16px;
}

.subhead{
font-size:13px;
color:var(--text-secondary);
margin-bottom:24px;
}

/* FOLDER GRID (HOME) */

.folder-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
gap:18px;
}

.folder-card{
height:150px;
background:white;
border:1px solid var(--border);
border-radius:var(--radius);
overflow:hidden;
position:relative;
cursor:pointer;
transition:box-shadow .15s ease, transform .15s ease, border-color .15s ease;
}

.folder-card:hover{
box-shadow:0 6px 18px rgba(6,43,85,.16);
border-color:#c7d2e0;
transform:translateY(-2px);
}

.folder-card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.cover-placeholder{
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg, #0b3d70, #062b55);
}

.folder-card::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(transparent 38%, rgba(6,17,32,.85));
}

.folder-top{
position:absolute;
top:10px;
left:10px;
right:10px;
z-index:2;
display:flex;
align-items:center;
justify-content:space-between;
}

.folder-top .folder-icon{
background:rgba(255,255,255,.92);
border-radius:6px;
padding:4px;
display:flex;
}

.folder-count{
font-size:11px;
font-weight:700;
color:var(--navy);
background:rgba(255,255,255,.92);
padding:3px 9px;
border-radius:12px;
}

.folder-text{
position:absolute;
bottom:13px;
left:15px;
right:15px;
z-index:2;
color:white;
}

.folder-text .fname{
font-size:15px;
font-weight:700;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.folder-text .fsub{
font-size:11.5px;
opacity:.85;
margin-top:2px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* FILE GRID (CATEGORY) */

.file-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:16px;
margin-top:20px;
}

.file-card{
background:white;
border:1px solid var(--border);
border-radius:var(--radius);
overflow:hidden;
cursor:pointer;
position:relative;
transition:box-shadow .15s ease, border-color .15s ease;
}

.file-card:hover{
box-shadow:0 3px 12px rgba(6,43,85,.14);
border-color:#c7d2e0;
}

.file-thumb{
height:130px;
background:#eef1f5;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.file-thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.file-meta{
padding:10px 12px;
}

.file-meta .fn{
font-size:12.5px;
font-weight:600;
color:var(--text);
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.file-meta .fn-input{
font-size:12.5px;
font-weight:600;
color:var(--text);
width:100%;
border:1px solid var(--navy);
border-radius:4px;
padding:2px 4px;
outline:none;
font-family:inherit;
}

.file-meta .fd{
font-size:11px;
color:var(--text-secondary);
margin-top:2px;
}

.kebab{
position:absolute;
top:6px;
right:6px;
width:28px;
height:28px;
border-radius:50%;
background:rgba(255,255,255,.92);
border:none;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
opacity:0;
transition:opacity .12s ease, background .12s ease;
}

.file-card:hover .kebab{
opacity:1;
}

.kebab:hover{
background:white;
}

.kebab-menu{
position:absolute;
top:38px;
right:6px;
background:white;
border:1px solid var(--border);
border-radius:6px;
box-shadow:0 4px 16px rgba(0,0,0,.15);
z-index:15;
overflow:hidden;
display:none;
min-width:150px;
}

.kebab-menu.show{
display:block;
}

.kebab-menu button{
display:flex;
align-items:center;
gap:10px;
width:100%;
padding:10px 14px;
border:none;
background:none;
font-size:13px;
text-align:left;
cursor:pointer;
color:var(--text);
}

.kebab-menu button:hover{
background:var(--bg);
}

.kebab-menu button.danger{
color:#c0392b;
}

/* ---------- MENU CONTEXTUEL (CLIC DROIT SUR LA GRILLE) ---------- */

.grid-context-menu{
position:fixed;
z-index:150;
min-width:220px;
}

.grid-context-menu button svg{
flex-shrink:0;
}

/* SUBFOLDER CARD (regroupement dans un dossier) */

.subfolder-card .file-thumb{
background:linear-gradient(135deg, #0b3d70, #062b55);
}

.subfolder-card .file-thumb svg path{
fill:white;
}

/* MODALE "NOUVEAU DOSSIER" */

.modal-overlay{
position:fixed;
inset:0;
background:rgba(6,17,32,.5);
display:none;
align-items:center;
justify-content:center;
z-index:160;
padding:20px;
}

.modal-overlay.show{
display:flex;
}

.modal-box{
background:white;
border-radius:10px;
padding:22px;
width:100%;
max-width:360px;
box-shadow:0 20px 60px rgba(0,0,0,.3);
}

.modal-title{
font-size:15px;
font-weight:700;
color:var(--text);
margin-bottom:14px;
}

.modal-input{
width:100%;
border:1px solid var(--border);
border-radius:6px;
padding:10px 12px;
font-size:13.5px;
outline:none;
font-family:inherit;
color:var(--text);
}

.modal-input:focus{
border-color:var(--navy);
}

.modal-actions{
display:flex;
justify-content:flex-end;
gap:10px;
margin-top:18px;
}

.modal-btn-secondary,
.modal-btn-primary{
border:none;
border-radius:20px;
padding:9px 18px;
font-size:13px;
font-weight:600;
cursor:pointer;
font-family:inherit;
}

.modal-btn-secondary{
background:var(--bg);
color:var(--text);
}

.modal-btn-secondary:hover{
background:var(--navy-soft);
}

.modal-btn-primary{
background:var(--navy);
color:white;
}

.modal-btn-primary:hover{
background:var(--navy-light);
}

/* ADD / DROPZONE TILE */

.add-tile{
height:130px;
border-radius:var(--radius);
border:2px dashed #c7d2e0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
color:var(--text-secondary);
font-size:12.5px;
gap:8px;
background:white;
transition:border-color .15s ease, color .15s ease, background .15s ease;
}

.add-tile:hover{
border-color:var(--navy);
color:var(--navy);
background:var(--navy-soft);
}

.file-grid.drag-over .add-tile{
border-color:var(--navy);
color:var(--navy);
background:var(--navy-soft);
}

/* EMPTY STATE */

.empty-state{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:60px 20px;
color:var(--text-secondary);
text-align:center;
gap:14px;
}

.empty-state .big-icon{
opacity:.55;
}

.empty-state .msg{
font-size:14px;
max-width:340px;
}

/* LIGHTBOX */

.lightbox{
position:fixed;
inset:0;
background:rgba(6,17,32,.9);
display:none;
align-items:center;
justify-content:center;
z-index:100;
padding:40px;
}

.lightbox.show{
display:flex;
}

.lightbox img{
max-width:100%;
max-height:100%;
border-radius:4px;
box-shadow:0 10px 40px rgba(0,0,0,.5);
}

.lightbox-close{
position:absolute;
top:24px;
right:32px;
background:rgba(255,255,255,.12);
border:none;
color:white;
width:40px;
height:40px;
border-radius:50%;
font-size:20px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.lightbox-close:hover{
background:rgba(255,255,255,.22);
}

.lightbox-nav{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(255,255,255,.12);
border:none;
color:white;
width:48px;
height:48px;
border-radius:50%;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
z-index:5;
}

.lightbox-nav:hover{
background:rgba(255,255,255,.22);
}

.lightbox-prev{left:18px;}
.lightbox-next{right:18px;}

.lightbox-counter{
position:absolute;
bottom:22px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:13px;
font-weight:600;
background:rgba(255,255,255,.12);
padding:5px 14px;
border-radius:14px;
}

@media (pointer:coarse){
.lightbox-nav{
width:44px;
height:44px;
}
.lightbox-prev{left:8px;}
.lightbox-next{right:8px;}
}

.toast{
position:fixed;
bottom:26px;
left:50%;
transform:translateX(-50%) translateY(20px);
background:#202124;
color:white;
padding:12px 20px;
border-radius:6px;
font-size:13px;
opacity:0;
pointer-events:none;
transition:opacity .2s ease, transform .2s ease;
z-index:200;
}

.toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

::-webkit-scrollbar{
width:10px;
}
::-webkit-scrollbar-thumb{
background:#d5dbe5;
border-radius:5px;
}
::-webkit-scrollbar-track{
background:transparent;
}

/* ---------- SYNC / STATUS BADGE ---------- */

.sync-status{
display:flex;
align-items:center;
gap:7px;
font-size:12px;
font-weight:600;
color:var(--text-secondary);
padding:6px 12px;
border-radius:14px;
background:var(--bg);
flex-shrink:0;
white-space:nowrap;
}

.sync-dot{
width:8px;
height:8px;
border-radius:50%;
background:#8a9;
flex-shrink:0;
}

.sync-status.online .sync-dot{background:#2fa84f;}
.sync-status.offline .sync-dot{background:#c94b4b;}
.sync-status.syncing .sync-dot{background:#e0a52c;animation:pulse 1s infinite;}

@keyframes pulse{
0%,100%{opacity:1;}
50%{opacity:.35;}
}

.file-card.pending{
opacity:.6;
}

.file-card .pending-badge{
position:absolute;
top:6px;
left:6px;
background:rgba(6,43,85,.9);
color:#fff;
font-size:10px;
font-weight:700;
padding:2px 7px;
border-radius:10px;
z-index:2;
}

.file-card .pages-badge{
position:absolute;
top:6px;
left:6px;
background:rgba(6,43,85,.9);
color:#fff;
font-size:10px;
font-weight:700;
padding:2px 7px;
border-radius:10px;
z-index:2;
}

.file-thumb{
position:relative;
}

/* ---------- BOUTON MENU (TABLETTE / MOBILE) ---------- */

.menu-toggle{
display:none;
align-items:center;
justify-content:center;
width:38px;
height:38px;
border-radius:50%;
border:none;
background:var(--bg);
color:var(--text);
cursor:pointer;
flex-shrink:0;
}

.menu-toggle:hover{
background:var(--navy-soft);
}

.sidebar-overlay{
display:none;
position:fixed;
inset:0;
background:rgba(6,17,32,.35);
z-index:40;
}

.sidebar-overlay.show{
display:block;
}

/* ---------- ACCORDÉON "NOS RÉALISATIONS" ---------- */

.nav-accordion{
margin-top:6px;
}

.nav-accordion-header{
display:flex;
align-items:center;
justify-content:space-between;
gap:8px;
padding:9px 14px;
border-radius:20px;
font-size:11px;
font-weight:700;
color:var(--text-secondary);
letter-spacing:.5px;
text-transform:uppercase;
cursor:pointer;
transition:background .12s ease, color .12s ease;
}

.nav-accordion-header:hover{
background:var(--navy-soft);
color:var(--navy);
}

.nav-accordion-header .chevron{
flex-shrink:0;
transition:transform .18s ease;
}

.nav-accordion-header.open .chevron{
transform:rotate(90deg);
}

.nav-accordion-body{
display:none;
flex-direction:column;
gap:6px;
padding-top:4px;
}

.nav-accordion-body.open{
display:flex;
}

/* ---------- FLIPBOOK (CATALOGUES FEUILLETABLES) ---------- */

.flipbook-overlay{
position:fixed;
inset:0;
background:rgba(6,17,32,.94);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:110;
padding:24px;
}

.flipbook-overlay.show{
display:flex;
}

.flipbook-topbar{
display:flex;
align-items:center;
justify-content:space-between;
width:100%;
max-width:900px;
color:white;
margin-bottom:14px;
font-size:14px;
font-weight:600;
gap:12px;
}

.flipbook-topbar span{
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.flipbook-close{
background:rgba(255,255,255,.12);
border:none;
color:white;
width:40px;
height:40px;
border-radius:50%;
font-size:20px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}

.flipbook-close:hover{
background:rgba(255,255,255,.22);
}

.flipbook-stage-wrap{
display:flex;
align-items:center;
gap:16px;
}

.flip-stage-scroll{
position:relative;
box-shadow:0 20px 60px rgba(0,0,0,.55);
border-radius:4px;
overflow:auto;
background:#111;
width:min(80vw,640px);
height:min(70vh,860px);
}

.flip-stage{
position:relative;
perspective:2400px;
width:100%;
height:100%;
transform-origin:center center;
transition:transform .2s ease;
}

.flip-stage img{
display:block;
width:100%;
height:100%;
object-fit:contain;
background:white;
user-select:none;
-webkit-user-drag:none;
}

.flip-back{
position:absolute;
inset:0;
}

.flip-leaf{
position:absolute;
inset:0;
transform-style:preserve-3d;
transform-origin:left center;
will-change:transform;
}

.flip-face{
position:absolute;
inset:0;
backface-visibility:hidden;
}

.flipbook-nav-btn{
background:rgba(255,255,255,.12);
border:none;
color:white;
width:46px;
height:46px;
border-radius:50%;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}

.flipbook-nav-btn:hover{
background:rgba(255,255,255,.22);
}

.flipbook-nav-btn:disabled{
opacity:.25;
cursor:default;
}

.flipbook-counter{
color:white;
font-size:13px;
margin-top:14px;
font-weight:600;
}

.flipbook-zoom-controls{
display:flex;
align-items:center;
gap:6px;
flex-shrink:0;
}

.flipbook-zoom-btn{
background:rgba(255,255,255,.12);
border:none;
color:white;
width:34px;
height:34px;
border-radius:50%;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}

.flipbook-zoom-btn:hover{
background:rgba(255,255,255,.22);
}

.flipbook-zoom-btn:disabled{
opacity:.25;
cursor:default;
}

.flipbook-slider-wrap{
width:100%;
max-width:900px;
margin-top:12px;
padding:0 4px;
box-sizing:border-box;
}

.flipbook-slider{
-webkit-appearance:none;
appearance:none;
width:100%;
height:20px;
background:transparent;
cursor:pointer;
margin:0;
display:block;
}

.flipbook-slider::-webkit-slider-runnable-track{
height:2px;
background:rgba(255,255,255,.35);
border-radius:2px;
}

.flipbook-slider::-moz-range-track{
height:2px;
background:rgba(255,255,255,.35);
border-radius:2px;
}

.flipbook-slider::-webkit-slider-thumb{
-webkit-appearance:none;
width:16px;
height:16px;
margin-top:-7px;
border-radius:50%;
background:#fff;
box-shadow:0 1px 4px rgba(0,0,0,.4);
}

.flipbook-slider::-moz-range-thumb{
width:16px;
height:16px;
border:none;
border-radius:50%;
background:#fff;
box-shadow:0 1px 4px rgba(0,0,0,.4);
}

@media (max-width:860px){
.flip-stage-scroll{
width:min(84vw,640px);
height:min(62vh,860px);
}
.flipbook-nav-btn{
width:40px;
height:40px;
}
.flipbook-zoom-btn{
width:30px;
height:30px;
}
}

/* ---------- RESPONSIVE TABLETTE ---------- */

@media (max-width:1100px){
.sidebar{
width:220px;
padding:16px 10px;
}
.main{
padding:22px 22px 44px;
}
.folder-grid{
grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
gap:14px;
}
.file-grid{
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:14px;
}
}

@media (max-width:860px){
.topbar{
height:56px;
padding:0 12px;
gap:10px;
}
.brand{
min-width:0;
gap:8px;
}
.brand-name{
display:none;
}
.search-wrap{
height:40px;
padding:0 14px;
}
.sync-status .sync-label-text{
display:none;
}
.sync-status{

];

/* ---------- CONFIG FIREBASE ---------- */

const firebaseConfig = {
  apiKey: "AIzaSyA8VmG0G0IxEHkTlicftSkyV5u59M2-uoI",
  authDomain: "foultot-catalogue.firebaseapp.com",
  projectId: "foultot-catalogue",
  storageBucket: "foultot-catalogue.firebasestorage.app",
  messagingSenderId: "105164383108",
  appId: "1:105164383108:web:c30df8d9dbdc2917f533d1",
  measurementId: "G-7EP6EKDFR6"
};

const FIREBASE_READY = true;
const FIRESTORE_DOC_SAFE_LIMIT = 900 * 1024;

let db = null;
let fbFns = {};
let allFiles = [];

if(window.pdfjsLib){
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
}

async function initFirebase(){
  try{
    const [{initializeApp}, firestoreMod] = await Promise.all([
      import("https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js"),
      import("https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js")
    ]);
    const app = initializeApp(firebaseConfig);
    db = firestoreMod.initializeFirestore(app, {
      localCache: firestoreMod.persistentLocalCache({
        cacheSizeBytes: firestoreMod.CACHE_SIZE_UNLIMITED
      })
    });
    fbFns = {
      collection: firestoreMod.collection,
      doc: firestoreMod.doc,
      setDoc: firestoreMod.setDoc,
      updateDoc: firestoreMod.updateDoc,
      deleteDoc: firestoreMod.deleteDoc,
      onSnapshot: firestoreMod.onSnapshot,
      query: firestoreMod.query,
      where: firestoreMod.where,
      getDocs: firestoreMod.getDocs
    };
    listenToFiles();
  }catch(err){
    console.error(err);
    setSyncStatus("offline", "Erreur de connexion Firebase");
    showToast("Connexion Firebase impossible, vérifie ta config / tes règles");
  }
}

/* ---------- SYNC TEMPS RÉEL (Firestore -> mémoire -> rendu) ---------- */

function listenToFiles(){
  const filesCol = fbFns.collection(db, "files");
  setSyncStatus("syncing", "Synchronisation…");
  fbFns.onSnapshot(filesCol, (snapshot) => {
    allFiles = snapshot.docs.map(d => ({
      id: d.id,
      ...d.data(),
      pending: d.metadata.hasPendingWrites
    }));
    if(snapshot.metadata.fromCache){
      setSyncStatus(navigator.onLine ? "syncing" : "offline", navigator.onLine ? "Synchronisation…" : "Hors-ligne (cache local)");
    }else{
      setSyncStatus("online", "Synchronisé");
    }
    renderSidebar();
    renderCurrentView();
  }, (err) => {
    console.error(err);
    setSyncStatus("offline", "Hors-ligne (cache local)");
  });
}

window.addEventListener("online", () => setSyncStatus("syncing", "Reconnexion…"));
window.addEventListener("offline", () => setSyncStatus("offline", "Hors-ligne (cache local)"));

/* ---------- COMPRESSION IMAGE ---------- */

function compressImageToDataURL(file, maxWidth, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > maxWidth){
          h = Math.round(h * (maxWidth / w));
          w = maxWidth;
        }
        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function fileToDataURL(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function prepareFileForUpload(file){
  if(file.type && file.type.startsWith("image/")){
    let quality = 0.75, maxWidth = 1600;
    let dataURL = await compressImageToDataURL(file, maxWidth, quality);
    let attempts = 0;
    while(dataURL.length > FIRESTORE_DOC_SAFE_LIMIT && attempts < 5){
      quality = Math.max(0.35, quality - 0.15);
      maxWidth = Math.max(800, Math.round(maxWidth * 0.75));
      dataURL = await compressImageToDataURL(file, maxWidth, quality);
      attempts++;
    }
    if(dataURL.length > FIRESTORE_DOC_SAFE_LIMIT) throw new Error("TOO_LARGE");
    return {dataURL, type:"image/jpeg"};
  }else{
    const dataURL = await fileToDataURL(file);
    if(dataURL.length > FIRESTORE_DOC_SAFE_LIMIT) throw new Error("TOO_LARGE");
    return {dataURL, type:file.type || "application/pdf"};
  }
}

/* ---------- CATALOGUES PDF -> PAGES FEUILLETABLES ---------- */

async function renderPdfPageCompressed(page, startScale){
  let scale = startScale;
  for(let attempt = 0; attempt < 4; attempt++){
    const viewport = page.getViewport({scale});
    const canvas = document.createElement("canvas");
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await page.render({canvasContext:canvas.getContext("2d"), viewport}).promise;
    let quality = 0.7;
    for(let q = 0; q < 4; q++){
      const dataURL = canvas.toDataURL("image/jpeg", quality);
      if(dataURL.length <= FIRESTORE_DOC_SAFE_LIMIT) return dataURL;
      quality -= 0.15;
    }
    scale *= 0.7;
  }
  const viewport = page.getViewport({scale:0.5});
  const canvas = document.createElement("canvas");
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  await page.render({canvasContext:canvas.getContext("2d"), viewport}).promise;
  return canvas.toDataURL("image/jpeg", 0.35);
}

async function pdfFileToPages(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;
  const pages = [];
  for(let i = 1; i <= pdf.numPages; i++){
    const page = await pdf.getPage(i);
    pages.push(await renderPdfPageCompressed(page, 1.4));
  }
  return pages;
}

async function uploadCatalog(file, category){
  showToast(`Traitement de "${file.name}"…`);
  const pages = await pdfFileToPages(file);
  const catalogId = crypto.randomUUID();
  const manifestId = crypto.randomUUID();

  await fbFns.setDoc(fbFns.doc(db, "files", manifestId), {
    category,
    name: file.name.replace(/\.pdf$/i, ""),
    type: "catalog",
    catalogId,
    pageCount: pages.length,
    dataURL: pages[0],
    size: pages.reduce((a, p) => a + p.length, 0),
    date: Date.now()
  });

  for(let i = 0; i < pages.length; i++){
    await fbFns.setDoc(fbFns.doc(db, "catalogPages", catalogId + "_" + i), {
      catalogId,
      pageIndex: i,
      dataURL: pages[i]
    });
  }
  return pages.length;
}

/* ---------- HELPERS ---------- */

function formatSize(bytes){
  if(bytes < 1024) return bytes + " o";
  if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + " Ko";
  return (bytes/(1024*1024)).toFixed(1) + " Mo";
}

function formatDate(ts){
  return new Date(ts).toLocaleDateString("fr-FR", {day:"2-digit", month:"2-digit", year:"numeric"});
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(() => t.classList.remove("show"), 3200);
}

function getFilesByCategory(category){
  return allFiles
    .filter(f => f.category === category)
    .sort((a,b) => b.date - a.date);
}

function isFolderMarker(f){
  return f.type === "folder";
}

function getRootFiles(category){
  return getFilesByCategory(category).filter(f => !f.folder && !isFolderMarker(f));
}

function getFolderFiles(category, folder){
  return getFilesByCategory(category).filter(f => f.folder === folder);
}

function getSubfolders(category){
  const map = {};
  getFilesByCategory(category).forEach(f => {
    if(isFolderMarker(f)){
      if(!map[f.name]) map[f.name] = {name:f.name, id:f.id, files:[]};
    }else if(f.folder){
      if(!map[f.folder]) map[f.folder] = {name:f.folder, id:null, files:[]};
      map[f.folder].files.push(f);
    }
  });
  return Object.keys(map).sort().map(name => map[name]);
}

function getAllCounts(){
  const counts = {};
  allFiles.forEach(f => {
    if(isFolderMarker(f)) return;
    counts[f.category] = (counts[f.category] || 0) + 1;
  });
  return counts;
}

function getCoverImage(key){
  const f = allFiles.find(f => f.category === key && ((f.type && f.type.startsWith("image/")) || f.type === "catalog"));
  return f ? f.dataURL : null;
}

/* ---------- RENOMMER UN FICHIER ---------- */

function startRename(card, file){
  const fnEl = card.querySelector(".fn");
  if(!fnEl) return;

  const currentName = file.name;
  const input = document.createElement("input");
  input.type = "text";
  input.className = "fn-input";
  input.value = currentName;

  fnEl.replaceWith(input);
  input.focus();
  input.select();

  let finished = false;

  const finish = async (save) => {
    if(finished) return;
    finished = true;
    const newName = input.value.trim();
    input.replaceWith(fnEl);
    if(save && newName && newName !== currentName){
      fnEl.textContent = newName;
      try{
        await fbFns.updateDoc(fbFns.doc(db, "files", file.id), {name:newName});
        showToast("Fichier renommé");
      }catch(err){
        console.error(err);
        fnEl.textContent = currentName;
        showToast("Impossible de renommer (repasse en ligne et réessaie)");
      }
    }else{
      fnEl.textContent = currentName;
    }
  };

  input.addEventListener("keydown", (e) => {
    e.stopPropagation();
    if(e.key === "Enter") finish(true);
    if(e.key === "Escape") finish(false);
  });
  input.addEventListener("click", (e) => e.stopPropagation());
  input.addEventListener("blur", () => finish(true));
}

/* ---------- ENVOI (compression -> Firestore) ---------- */

async function handleFiles(fileList, key, folder = null){
  const files = Array.from(fileList || []);
  if(files.length === 0) return;

  if(!db){
    showToast("Firebase pas encore connecté, réessaie dans un instant");
    return;
  }

  let okCount = 0;
  for(const file of files){
    try{
      if(key === "catalogues-fournisseurs" && file.type === "application/pdf"){
        const n = await uploadCatalog(file, key);
        showToast(`"${file.name}" ajouté (${n} pages)`);
        okCount++;
        continue;
      }
      if(file.type && !file.type.startsWith("image/") && file.type !== "application/pdf") continue;
      const {dataURL, type} = await prepareFileForUpload(file);
      const id = crypto.randomUUID();
      await fbFns.setDoc(fbFns.doc(db, "files", id), {
        category:key, name:file.name, size:dataURL.length, type,
        date:Date.now(), dataURL, folder: folder || ""
      });
      okCount++;
    }catch(err){
      if(err && err.message === "TOO_LARGE"){
        showToast(`"${file.name}" est trop lourd même compressé (> ~650 Ko). Essaie une version plus légère.`);
      }else{
        console.error(err);
        showToast("Erreur lors de l'envoi de " + file.name);
      }
    }
  }
  if(okCount > 0 && key !== "catalogues-fournisseurs"){
    showToast(okCount > 1 ? okCount + " fichiers envoyés" : "Fichier envoyé");
  }
}

/* ---------- RENOMMER / SUPPRIMER UN SOUS-DOSSIER ---------- */

function startRenameFolder(card, category, sf){
  const fnEl = card.querySelector(".fn");
  if(!fnEl) return;

  const currentName = sf.name;
  const input = document.createElement("input");
  input.type = "text";
  input.className = "fn-input";
  input.value = currentName;

  fnEl.replaceWith(input);
  input.focus();
  input.select();

  let finished = false;

  const finish = async (save) => {
    if(finished) return;
    finished = true;
    const newName = input.value.trim();
    input.replaceWith(fnEl);
    if(save && newName && newName !== currentName){
      const clash = getSubfolders(category).some(o => o.name !== currentName && o.name.toLowerCase() === newName.toLowerCase());
      if(clash){
        showToast("Un dossier porte déjà ce nom");
        fnEl.textContent = currentName;
        return;
      }
      fnEl.textContent = newName;
      try{
        await Promise.all(sf.files.map(f => fbFns.updateDoc(fbFns.doc(db, "files", f.id), {folder:newName})));
        if(sf.id){
          await fbFns.updateDoc(fbFns.doc(db, "files", sf.id), {name:newName});
        }
        showToast("Dossier renommé");
      }catch(err){
        console.error(err);
        fnEl.textContent = currentName;
        showToast("Impossible de renommer (repasse en ligne et réessaie)");
      }
    }else{
      fnEl.textContent = currentName;
    }
  };

  input.addEventListener("keydown", (e) => {
    e.stopPropagation();
    if(e.key === "Enter") finish(true);
    if(e.key === "Escape") finish(false);
  });
  input.addEventListener("click", (e) => e.stopPropagation());
  input.addEventListener("blur", () => finish(true));
}

async function deleteFolder(sf){
  const ok = window.confirm(
    sf.files.length > 0
      ? `Supprimer le dossier "${sf.name}" et ${sf.files.length} photo${sf.files.length > 1 ? "s" : ""} qu'il contient ? Cette action est irréversible.`
      : `Supprimer le dossier "${sf.name}" ?`
  );
  if(!ok) return;
  try{
    for(const f of sf.files){
      await deleteFileEverywhere(f);
    }
    if(sf.id){
      await fbFns.deleteDoc(fbFns.doc(db, "files", sf.id));
    }
    showToast("Dossier supprimé");
  }catch(err){
    console.error(err);
    showToast("Erreur lors de la suppression du dossier");
  }
}

/* ---------- CRÉATION D'UN DOSSIER (menu contextuel) ---------- */

let pendingFolderCategory = null;

function openCreateFolderModal(category){
  pendingFolderCategory = category;
  const input = document.getElementById("folderNameInput");
  input.value = "";
  document.getElementById("folderModalOverlay").classList.add("show");
  setTimeout(() => input.focus(), 50);
}

function closeCreateFolderModal(){
  document.getElementById("folderModalOverlay").classList.remove("show");
  pendingFolderCategory = null;
}

async function confirmCreateFolder(){
  const input = document.getElementById("folderNameInput");
  const name = input.value.trim();
  if(!name){
    showToast("Merci d'indiquer un nom de dossier");
    return;
  }
  if(!pendingFolderCategory) return;
  const clash = getSubfolders(pendingFolderCategory).some(sf => sf.name.toLowerCase() === name.toLowerCase());
  if(clash){
    showToast("Un dossier porte déjà ce nom");
    return;
  }
  if(!db){
    showToast("Firebase pas encore connecté, réessaie dans un instant");
    return;
  }
  try{
    const id = crypto.randomUUID();
    await fbFns.setDoc(fbFns.doc(db, "files", id), {category:pendingFolderCategory, name, type:"folder", size:0, date:Date.now()});
    showToast("Dossier créé");
    closeCreateFolderModal();
  }catch(err){
    console.error(err);
    showToast("Impossible de créer le dossier (réessaie)");
  }
}

/* ---------- SUPPRESSION ---------- */

async function deleteFileEverywhere(file){
  try{
    if(file.type === "catalog" && file.catalogId){
      const q = fbFns.query(fbFns.collection(db, "catalogPages"), fbFns.where("catalogId", "==", file.catalogId));
      const snap = await fbFns.getDocs(q);
      await Promise.all(snap.docs.map(d => fbFns.deleteDoc(d.ref)));
    }
    await fbFns.deleteDoc(fbFns.doc(db, "files", file.id));
    showToast("Fichier supprimé");
  }catch(err){
    console.error(err);
    showToast("Suppression non synchronisée (repasse en ligne pour finaliser)");
  }
}

/* ---------- LIGHTBOX (photos) ---------- */

let lightboxImages = [];
let lightboxIndex = 0;

function openLightbox(images, index){
  lightboxImages = images;
  lightboxIndex = index;
  showLightboxImage();
  document.getElementById("lightbox").classList.add("show");
}
function showLightboxImage(){
  document.getElementById("lightboxImg").src = lightboxImages[lightboxIndex];
  const hasMultiple = lightboxImages.length > 1;
  document.getElementById("lightboxPrev").style.display = hasMultiple ? "flex" : "none";
  document.getElementById("lightboxNext").style.display = hasMultiple ? "flex" : "none";
  document.getElementById("lightboxCounter").textContent = hasMultiple ? (lightboxIndex + 1) + " / " + lightboxImages.length : "";
}
function lightboxPrev(){
  if(lightboxImages.length < 2) return;
  lightboxIndex = (lightboxIndex - 1 + lightboxImages.length) % lightboxImages.length;
  showLightboxImage();
}
function lightboxNext(){
  if(lightboxImages.length < 2) return;
  lightboxIndex = (lightboxIndex + 1) % lightboxImages.length;
  showLightboxImage();
}
function closeLightbox(){
  document.getElementById("lightbox").classList.remove("show");
}

/* ---------- FLIPBOOK (catalogues) ---------- */

let flipPages = [];
let flipIndex = 0;
let flipAnimating = false;

async function openFlipbook(file){
  const overlay = document.getElementById("flipbookOverlay");
  document.getElementById("flipbookTitle").textContent = file.name;
  document.getElementById("flipCounter").textContent = "Chargement…";
  flipPages = [];
  flipIndex = 0;
  overlay.classList.add("show");

  try{
    const q = fbFns.query(fbFns.collection(db, "catalogPages"), fbFns.where("catalogId", "==", file.catalogId));
    const snap = await fbFns.getDocs(q);
    const pages = snap.docs.map(d => d.data()).sort((a,b) => a.pageIndex - b.pageIndex);
    flipPages = pages.map(p => p.dataURL);
  }catch(err){
    console.error(err);
    showToast("Impossible de charger le catalogue (connexion ?)");
    closeFlipbook();
    return;
  }

  if(flipPages.length === 0){
    showToast("Ce catalogue est vide");
    closeFlipbook();
    return;
  }

  await sizeFlipStage(flipPages[0]);
  const leaf = document.getElementById("flipLeaf");
  document.getElementById("flipBackImg").src = flipPages[1] || flipPages[0];
  document.getElementById("flipFrontImg").src = flipPages[0];
  leaf.style.transition = "none";
  leaf.style.transform = "rotateY(0deg)";
  resetFlipZoom();
  const slider = document.getElementById("flipSlider");
  slider.min = 1;
  slider.max = flipPages.length;
  slider.value = 1;
  updateFlipCounter();
  updateFlipButtons();
  updateFlipSlider();
}

/* ---------- ZOOM ---------- */

let flipZoom = 1;
const FLIP_ZOOM_MIN = 1;
const FLIP_ZOOM_MAX = 2.5;
const FLIP_ZOOM_STEP = .25;

function applyFlipZoom(){
  document.getElementById("flipStage").style.transform = "scale(" + flipZoom + ")";
  document.getElementById("flipZoomOutBtn").disabled = flipZoom <= FLIP_ZOOM_MIN;
  document.getElementById("flipZoomInBtn").disabled = flipZoom >= FLIP_ZOOM_MAX;
}
function resetFlipZoom(){
  flipZoom = 1;
  applyFlipZoom();
  document.getElementById("flipStageScroll").scrollTo(0,0);
}
function flipZoomIn(){
  flipZoom = Math.min(FLIP_ZOOM_MAX, +(flipZoom + FLIP_ZOOM_STEP).toFixed(2));
  applyFlipZoom();
}
function flipZoomOut(){
  flipZoom = Math.max(FLIP_ZOOM_MIN, +(flipZoom - FLIP_ZOOM_STEP).toFixed(2));
  applyFlipZoom();
  if(flipZoom === FLIP_ZOOM_MIN) document.getElementById("flipStageScroll").scrollTo(0,0);
}

/* ---------- SLIDER (navigation rapide dans les pages) ---------- */

function updateFlipSlider(){
  document.getElementById("flipSlider").value = flipIndex + 1;
}

function goToFlipPage(pageNumber){
  if(flipAnimating || flipPages.length === 0) return;
  const idx = Math.min(Math.max(pageNumber - 1, 0), flipPages.length - 1);
  if(idx === flipIndex) return;
  flipIndex = idx;
  const leaf = document.getElementById("flipLeaf");
  leaf.style.transition = "none";
  leaf.style.transform = "rotateY(0deg)";
  document.getElementById("flipFrontImg").src = flipPages[flipIndex];
  document.getElementById("flipBackImg").src = flipPages[flipIndex + 1] || flipPages[flipIndex];
  resetFlipZoom();
  updateFlipCounter();
  updateFlipButtons();
  updateFlipSlider();
}

function sizeFlipStage(src){
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const stage = document.getElementById("flipStageScroll");
      const maxH = window.innerHeight * 0.68;
      const maxW = window.innerWidth * 0.85;
      let h = maxH, w = h * (img.width / img.height);
      if(w > maxW){ w = maxW; h = w * (img.height / img.width); }
      stage.style.width = w + "px";
      stage.style.height = h + "px";
      resolve();
    };
    img.onerror = resolve;
    img.src = src;
  });
}

function updateFlipCounter(){
  document.getElementById("flipCounter").textContent = (flipIndex + 1) + " / " + flipPages.length;
}
function updateFlipButtons(){
  document.getElementById("flipPrevBtn").disabled = flipIndex === 0 || flipAnimating;
  document.getElementById("flipNextBtn").disabled = flipIndex === flipPages.length - 1 || flipAnimating;
}

function flipNextPage(){
  if(flipAnimating || flipIndex >= flipPages.length - 1) return;
  flipAnimating = true;
  updateFlipButtons();
  const leaf = document.getElementById("flipLeaf");
  const backImg = document.getElementById("flipBackImg");
  const frontImg = document.getElementById("flipFrontImg");
  const nextIndex = flipIndex + 1;

  backImg.src = flipPages[nextIndex];
  frontImg.src = flipPages[flipIndex];
  leaf.style.transition = "none";
  leaf.style.transform = "rotateY(0deg)";
  void leaf.offsetWidth;
  leaf.style.transition = "transform .65s cubic-bezier(.45,.05,.35,1)";

  const onEnd = () => {
    leaf.removeEventListener("transitionend", onEnd);
    flipIndex = nextIndex;
    frontImg.src = flipPages[flipIndex];
    backImg.src = flipPages[flipIndex + 1] || flipPages[flipIndex];
    leaf.style.transition = "none";
    leaf.style.transform = "rotateY(0deg)";
    flipAnimating = false;
    resetFlipZoom();
    updateFlipCounter();
    updateFlipButtons();
    updateFlipSlider();
  };
  leaf.addEventListener("transitionend", onEnd);
  requestAnimationFrame(() => { leaf.style.transform = "rotateY(-180deg)"; });
}

function flipPrevPage(){
  if(flipAnimating || flipIndex <= 0) return;
  flipAnimating = true;
  updateFlipButtons();
  const leaf = document.getElementById("flipLeaf");
  const backImg = document.getElementById("flipBackImg");
  const frontImg = document.getElementById("flipFrontImg");
  const prevIndex = flipIndex - 1;

  backImg.src = flipPages[flipIndex];
  frontImg.src = flipPages[prevIndex];
  leaf.style.transition = "none";
  leaf.style.transform = "rotateY(-180deg)";
  void leaf.offsetWidth;
  leaf.style.transition = "transform .65s cubic-bezier(.45,.05,.35,1)";

  const onEnd = () => {
    leaf.removeEventListener("transitionend", onEnd);
    flipIndex = prevIndex;
    frontImg.src = flipPages[flipIndex];
    backImg.src = flipPages[flipIndex + 1] || flipPages[flipIndex];
    leaf.style.transition = "none";
    leaf.style.transform = "rotateY(0deg)";
    flipAnimating = false;
    resetFlipZoom();
    updateFlipCounter();
    updateFlipButtons();
    updateFlipSlider();
  };
  leaf.addEventListener("transitionend", onEnd);
  requestAnimationFrame(() => { leaf.style.transform = "rotateY(0deg)"; });
}

function closeFlipbook(){
  document.getElementById("flipbookOverlay").classList.remove("show");
  flipPages = [];
}

document.getElementById("flipSlider").addEventListener("input", (e) => {

});

document.addEventListener("keydown", (e) => {
  if(document.getElementById("lightbox").classList.contains("show")){
    if(e.key === "Escape") closeLightbox();
    if(e.key === "ArrowLeft") lightboxPrev();
    if(e.key === "ArrowRight") lightboxNext();
  }
  if(document.getElementById("flipbookOverlay").classList.contains("show")){
    if(e.key === "Escape") closeFlipbook();
    if(e.key === "ArrowLeft") flipPrevPage();
    if(e.key === "ArrowRight") flipNextPage();
  }
});

/* swipe tactile (tablette / mobile) — lightbox */
(function(){
  const lb = document.getElementById("lightbox");
  let touchStartX = 0, touchStartY = 0;
  lb.addEventListener("touchstart", (e) => {
    touchStartX = e.changedTouches[0].clientX;
    touchStartY = e.changedTouches[0].clientY;
  }, {passive:true});
  lb.addEventListener("touchend", (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if(Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)){
      if(dx < 0) lightboxNext(); else lightboxPrev();
    }
  }, {passive:true});
})();

/* swipe tactile (tablette / mobile) — flipbook */
(function(){
  const stage = document.getElementById("flipStage");
  let touchStartX = 0, touchStartY = 0;
  stage.addEventListener("touchstart", (e) => {
    touchStartX = e.changedTouches[0].clientX;
    touchStartY = e.changedTouches[0].clientY;
  }, {passive:true});
  stage.addEventListener("touchend", (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if(Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)){
      if(dx < 0) flipNextPage(); else flipPrevPage();
    }
  }, {passive:true});
})();
